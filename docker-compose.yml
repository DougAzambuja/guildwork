services:
  mongodb:
    image: mongo:latest
    container_name: guildwork_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d # 👈 Linha nova adicionada aqui!
    environment:
      MONGO_INITDB_ROOT_USERNAME: guild_admin
      MONGO_INITDB_ROOT_PASSWORD: guild_password

volumes:
  mongo_data: