<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuildWork - Leaderboard Sazonal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loading-overlay" data-cy="loading-overlay">
        <span class="loading-sword">🏆</span>
        <div class="loading-text">CARREGANDO RANKING...</div>
        <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
    </div>
    <div class="lb-top-bar">
        <div class="lb-top-player">
            <img src="assets/imgs/caneca_pixel.jpg" class="lb-top-avatar" id="topAvatar" alt=""
                 style="cursor:pointer;"
                 onclick="window.location.href='perfil.html'"
                 title="Ver meu perfil"
                 data-cy="player-avatar">
            <div>
                <div class="lb-top-name" id="topName">Aventureiro</div>
                <div class="lb-top-level" id="topLevel">Lvl 1</div>
            </div>
        </div>
        <div class="actions lb-top-actions">
            <a href="index.html"  class="btn-pixel btn-info" data-cy="btn-board">🗺️ Mural</a>
            <a href="guild.html"  class="btn-pixel btn-special" data-cy="btn-guilda">🏰 Guilda</a>

            <span class="actions-divider"></span>

            <button class="btn-pixel logout-btn" data-cy="btn-logout" onclick="logout()">Sair</button>
        </div>
    </div>

    <div class="lb-wrapper">
        <div class="lb-title">🏆 LEADERBOARD SAZONAL</div>
        <div class="lb-week" id="lbWeek">Carregando semana...</div>

        <!-- Pódio top 3 -->
        <div class="lb-podium" id="lbPodium"></div>

        <!-- Tabela completa -->
        <div class="lb-table-wrap">
            <div class="lb-table-header">📊 RANKING DA SEMANA</div>
            <div id="lbTableContainer">
                <div class="lb-empty">Carregando ranking...</div>
            </div>
        </div>
    </div>

    <div id="toast-container" data-cy="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/leaderboard.js"></script>
</body>
</html>
