<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuildWork - Missões</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="top-bar">
            <div class="player-info">
                <div class="avatar" style="background-color: #f1c40f; display:flex; align-items:center; justify-content:center; font-size:8px; text-align:center;">DM</div>
                <div class="stats">
                    <h1 id="playerName">Mestre da Guilda</h1>
                    <div style="font-size: 10px; color: #7f8c8d;">Centro de Comando</div>
                </div>
            </div>
            <div class="actions">
                <button class="btn-pixel logout-btn" data-cy="btn-logout" onclick="logout()">Sair</button>
            </div>
        </div>

        <nav class="admin-tabs">
            <a href="admin.html" class="admin-tab">📈 Dashboard</a>
            <a href="admin-quests.html" class="admin-tab active">⚔️ Missões</a>
            <a href="admin-loot.html" class="admin-tab">🔨 Loot</a>
            <a href="admin-roster.html" class="admin-tab">🛡️ Membros</a>
            <a href="admin-sprints.html" class="admin-tab">🏃 Sprints</a>
            <a href="admin-metrics.html" class="admin-tab">📊 Métricas</a>
        </nav>

        <div style="display:flex; flex-direction:column; gap:24px;">

            <div class="dashboard-section" data-cy="dashboard-forge-quests">
                <h2 class="section-title">⚔️ FORJA DE QUESTS (CRIAR MISSÃO)</h2>
                <form id="questForm" class="forge-form" data-cy="form-add-quest">
                    <div class="forge-group">
                        <label for="questTitle">Título da Missão</label>
                        <input type="text" id="questTitle" class="pixel-input" data-cy="input-quest-title" placeholder="Ex: Resolver Bug X" required autocomplete="off">
                    </div>
                    <div class="forge-group">
                        <label for="questType">Tipo</label>
                        <select id="questType" class="pixel-input" data-cy="select-quest-type">
                            <option value="normal">Normal</option>
                            <option value="urgent">Urgente</option>
                            <option value="support">Suporte</option>
                            <option value="jira">Jira</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div class="forge-group" style="flex: 1;">
                            <label for="questXp">XP</label>
                            <input type="number" id="questXp" class="pixel-input" data-cy="input-quest-xp" placeholder="300" required min="1">
                        </div>
                        <div class="forge-group" style="flex: 1;">
                            <label for="questCoins">Gold</label>
                            <input type="number" id="questCoins" class="pixel-input" data-cy="input-quest-gold" placeholder="30" required min="1">
                        </div>
                    </div>
                    <div class="forge-group">
                        <label for="slaTime">SLA (Segundos) — deixe vazio para sem tempo limite</label>
                        <input type="number" id="slaTime" class="pixel-input" data-cy="input-quest-sla" placeholder="Ex: 300" min="1">
                    </div>
                    <div class="forge-group">
                        <label for="questFaction">Guilda Responsável</label>
                        <select id="questFaction" class="pixel-input" data-cy="select-quest-faction">
                            <option value="Produto">📦 Produto</option>
                            <option value="Suporte">🎧 Suporte</option>
                            <option value="Customer Service">📣 Customer Service</option>
                        </select>
                    </div>
                    <div class="forge-group">
                        <label for="questSprint">Sprint (opcional)</label>
                        <select id="questSprint" class="pixel-input" data-cy="select-quest-sprint">
                            <option value="">🗂️ Sem sprint (Backlog)</option>
                        </select>
                    </div>
                    <div class="forge-group">
                        <label for="questLabels">Labels (opcional, separadas por vírgula)</label>
                        <input type="text" id="questLabels" class="pixel-input" data-cy="input-quest-labels" placeholder="Ex: bug, ux, p1">
                    </div>
                    <button type="submit" class="btn-pixel" data-cy="btn-submit-quest" style="background-color: #c0392b; padding: 15px;">FORJAR QUEST</button>
                </form>
            </div>

            <div class="dashboard-section" data-cy="dashboard-quests">
                <h2 class="section-title">📜 PERGAMINHOS FORJADOS</h2>

                <div data-cy="container-quest-filters" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center;">
                    <input type="text" id="filterSearch" class="pixel-input" data-cy="input-filter-search"
                           placeholder="🔍 Buscar por título..." style="flex:2;min-width:140px;">
                    <select id="filterFaction" class="pixel-input" data-cy="select-filter-faction" style="flex:1;min-width:110px;">
                        <option value="">Todas as Guildas</option>
                        <option value="Produto">📦 Produto</option>
                        <option value="Suporte">🎧 Suporte</option>
                        <option value="Customer Service">📣 Customer Service</option>
                    </select>
                    <select id="filterStatus" class="pixel-input" data-cy="select-filter-status" style="flex:1;min-width:110px;">
                        <option value="">Todos os Status</option>
                        <option value="todo">A Fazer</option>
                        <option value="in_progress">Em Progresso</option>
                        <option value="done">Concluída</option>
                    </select>
                    <select id="filterSprint" class="pixel-input" data-cy="select-filter-sprint" style="flex:1;min-width:130px;">
                        <option value="">Todas as Sprints</option>
                        <option value="backlog">🗂️ Backlog</option>
                    </select>
                </div>

                <div class="users-table-wrapper">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>Título</th>
                                <th>Tipo</th>
                                <th>Guilda</th>
                                <th>Sprint</th>
                                <th>XP</th>
                                <th>Gold</th>
                                <th>SLA</th>
                                <th>Status</th>
                                <th>Herói</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="adminQuestsTableBody"></tbody>
                    </table>
                </div>
                <div id="questPaginationRow" style="display:none; flex-direction:row; align-items:center; justify-content:center; gap:10px; flex-wrap:nowrap; margin-top:8px;">
                    <button id="btnQuestPrev" class="btn-pixel" style="font-size:8px;padding:8px 12px;flex-shrink:0;" data-cy="btn-quest-prev">← Anterior</button>
                    <span id="paginationPageInfo" class="pagination-info" style="white-space:nowrap;"></span>
                    <select id="filterLimit" data-cy="select-filter-limit"
                            style="font-size:8px;padding:5px 8px;width:85px;flex-shrink:0;background:#1a252f;border:2px solid #2c3e50;color:#f1c40f;cursor:pointer;font-family:inherit;">
                        <option value="10">10 / pág.</option>
                        <option value="25">25 / pág.</option>
                        <option value="50">50 / pág.</option>
                        <option value="100">100 / pág.</option>
                    </select>
                    <span id="paginationCountInfo" class="pagination-info" style="white-space:nowrap;"></span>
                    <button id="btnQuestNext" class="btn-pixel" style="font-size:8px;padding:8px 12px;flex-shrink:0;" data-cy="btn-quest-next">Próxima →</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Modal de Edição da Quest -->
    <div id="questEditModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeEditQuest()">
        <div class="modal-content" style="max-width:480px;width:95%;max-height:88vh;overflow-y:auto;">
            <h2 class="section-title" style="margin-bottom:16px;">✏️ EDITAR QUEST</h2>
            <form id="questEditForm" data-cy="form-edit-quest">
                <input type="hidden" id="editQuestId">
                <div class="forge-group">
                    <label for="editQuestTitle">Título</label>
                    <input type="text" id="editQuestTitle" class="pixel-input" data-cy="input-edit-quest-title" required autocomplete="off">
                </div>
                <div class="forge-group">
                    <label for="editQuestType">Tipo</label>
                    <select id="editQuestType" class="pixel-input" data-cy="select-edit-quest-type">
                        <option value="normal">Normal</option>
                        <option value="urgent">Urgente</option>
                        <option value="support">Suporte</option>
                        <option value="jira">Jira</option>
                    </select>
                </div>
                <div style="display:flex;gap:10px;">
                    <div class="forge-group" style="flex:1;">
                        <label for="editQuestXp">XP</label>
                        <input type="number" id="editQuestXp" class="pixel-input" data-cy="input-edit-quest-xp" min="1" required>
                    </div>
                    <div class="forge-group" style="flex:1;">
                        <label for="editQuestCoins">Gold</label>
                        <input type="number" id="editQuestCoins" class="pixel-input" data-cy="input-edit-quest-gold" min="1" required>
                    </div>
                </div>
                <div class="forge-group">
                    <label for="editQuestSla">SLA (Segundos) — vazio = sem limite</label>
                    <input type="number" id="editQuestSla" class="pixel-input" data-cy="input-edit-quest-sla" min="1">
                </div>
                <div class="forge-group">
                    <label for="editQuestFaction">Guilda</label>
                    <select id="editQuestFaction" class="pixel-input" data-cy="select-edit-quest-faction">
                        <option value="Produto">📦 Produto</option>
                        <option value="Suporte">🎧 Suporte</option>
                        <option value="Customer Service">📣 Customer Service</option>
                    </select>
                </div>
                <div class="forge-group">
                    <label for="editQuestSprint">Sprint</label>
                    <select id="editQuestSprint" class="pixel-input" data-cy="select-edit-quest-sprint">
                        <option value="">🗂️ Sem sprint (Backlog)</option>
                    </select>
                </div>
                <div class="forge-group">
                    <label for="editQuestLabels">Labels (separadas por vírgula)</label>
                    <input type="text" id="editQuestLabels" class="pixel-input" data-cy="input-edit-quest-labels" placeholder="Ex: bug, ux, p1">
                </div>
                <div style="display:flex;gap:8px;margin-top:16px;">
                    <button type="button" class="btn-pixel" onclick="closeEditQuest()" style="flex:1;background:#7f8c8d;" data-cy="btn-cancel-edit-quest">CANCELAR</button>
                    <button type="submit" class="btn-pixel" style="flex:1;background:#27ae60;" data-cy="btn-save-edit-quest">SALVAR QUEST</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de Detalhe da Quest (Admin) -->
    <div id="questAdminDetailModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeQuestDetail()">
        <div class="modal-content" style="max-width:540px;width:95%;max-height:88vh;overflow-y:auto;">

            <div id="qdm-a-type-badge"></div>
            <h2 id="qdm-a-title" class="quest-modal-title" style="margin:6px 0 12px;"></h2>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
                <div style="background:#0d1b2a;padding:10px;border-radius:2px;">
                    <div style="font-size:7px;color:#7f8c8d;margin-bottom:3px;">GUILDA</div>
                    <div id="qdm-a-faction" style="font-size:10px;color:#ecf0f1;"></div>
                </div>
                <div style="background:#0d1b2a;padding:10px;border-radius:2px;">
                    <div style="font-size:7px;color:#7f8c8d;margin-bottom:3px;">STATUS</div>
                    <div id="qdm-a-status"></div>
                </div>
                <div style="background:#0d1b2a;padding:10px;border-radius:2px;">
                    <div style="font-size:7px;color:#7f8c8d;margin-bottom:3px;">ATRIBUÍDO A</div>
                    <div id="qdm-a-assignee" style="font-size:10px;color:#ecf0f1;"></div>
                </div>
                <div style="background:#0d1b2a;padding:10px;border-radius:2px;">
                    <div style="font-size:7px;color:#7f8c8d;margin-bottom:3px;">SLA</div>
                    <div id="qdm-a-sla" style="font-size:10px;color:#ecf0f1;"></div>
                </div>
            </div>

            <!-- Checklist -->
            <div id="qdm-a-checklist" style="display:none;margin-bottom:14px;">
                <div style="font-size:8px;color:#7f8c8d;letter-spacing:1px;margin-bottom:8px;">CHECKLIST</div>
                <div id="qdm-a-checklist-progress" style="margin-bottom:8px;"></div>
                <div id="qdm-a-checklist-items"></div>
            </div>

            <!-- Timeline de atividade + comentários -->
            <div style="border-top:1px solid #2c3e50;padding-top:12px;">
                <div style="font-size:8px;color:#7f8c8d;letter-spacing:1px;margin-bottom:8px;">ATIVIDADE</div>
                <div id="qdm-a-comments" style="max-height:200px;overflow-y:auto;margin-bottom:10px;"></div>
                <div style="display:flex;gap:8px;">
                    <input type="text" id="qdm-a-comment-input" class="pixel-input"
                           data-cy="input-admin-quest-comment"
                           placeholder="Adicionar comentário na missão..."
                           style="flex:1;font-size:9px;padding:8px;"
                           onkeydown="if(event.key==='Enter')submitAdminComment()">
                    <button class="btn-pixel" data-cy="btn-admin-submit-comment"
                            onclick="submitAdminComment()"
                            style="font-size:8px;padding:8px 12px;background:#2980b9;flex-shrink:0;">Enviar</button>
                </div>
            </div>

            <button class="btn-pixel" onclick="closeQuestDetail()" style="width:100%;margin-top:14px;background:#7f8c8d;">FECHAR</button>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/admin-quests.js"></script>
</body>
</html>
