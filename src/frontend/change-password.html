<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuildWork — Definir Nova Senha</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--surface-page);
        }

        .change-pw-card {
            background: var(--surface-2);
            border: var(--border-subtle);
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            image-rendering: pixelated;
        }

        .change-pw-card .section-title {
            text-align: center;
            margin-bottom: 8px;
        }

        .change-pw-subtitle {
            text-align: center;
            font-size: var(--text-xs);
            color: var(--text-muted);
            margin-bottom: 28px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="change-pw-card">
        <h1 class="section-title">🔑 NOVA SENHA</h1>
        <p class="change-pw-subtitle">
            Por segurança, você precisa definir uma nova senha antes de continuar.
        </p>

        <form id="changePasswordForm" class="forge-form" data-cy="form-change-password">
            <div class="forge-group">
                <label for="currentPassword">Senha Atual</label>
                <input type="password" id="currentPassword" class="pixel-input"
                       placeholder="Senha fornecida pelo administrador"
                       required minlength="1"
                       data-cy="input-current-password">
            </div>
            <div class="forge-group">
                <label for="newPassword">Nova Senha</label>
                <input type="password" id="newPassword" class="pixel-input"
                       placeholder="Mínimo 6 caracteres"
                       required minlength="6"
                       data-cy="input-new-password">
            </div>
            <div class="forge-group">
                <label for="confirmPassword">Confirmar Nova Senha</label>
                <input type="password" id="confirmPassword" class="pixel-input"
                       placeholder="Repita a nova senha"
                       required minlength="6"
                       data-cy="input-confirm-password">
            </div>

            <button type="submit" class="btn-pixel btn-success"
                    style="width:100%; margin-top:16px; padding:14px;"
                    data-cy="btn-submit-change-password">
                ✅ CONFIRMAR NOVA SENHA
            </button>
        </form>
    </div>

    <div id="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/change-password.js"></script>
</body>
</html>
