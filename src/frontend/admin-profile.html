<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuildWork - Meu Perfil</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-wrapper {
            max-width: 560px;
            margin: 32px auto;
            padding: 0 16px;
        }
        .profile-card {
            background: #1a252f;
            border: 6px solid #111;
            box-shadow: 8px 8px 0 rgba(0,0,0,.6);
        }
        .profile-header {
            background: #0d1520;
            border-bottom: 4px solid #2c3e50;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .profile-avatar-wrap { position: relative; flex-shrink: 0; }
        .profile-avatar {
            width: 88px;
            height: 88px;
            object-fit: cover;
            border: 3px solid #f1c40f;
            image-rendering: pixelated;
            display: block;
        }
        .profile-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .profile-section-title {
            font-size: 9px;
            color: #f1c40f;
            letter-spacing: 2px;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid #2c3e50;
        }
        .profile-avatar-preview-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }
        .profile-avatar-preview {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border: 2px solid #2c3e50;
            image-rendering: pixelated;
            flex-shrink: 0;
        }
        .profile-dicebear-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 7px;
            padding: 6px 10px;
            background: #2c3e50;
            color: #3498db;
            border: 2px solid #3498db;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
        }
        .profile-dicebear-btn:hover { background: #3498db; color: #fff; }
    </style>
</head>
<body class="admin-page">
    <div id="admin-header"></div>

    <div class="main-wrapper">
        <div class="profile-wrapper">
            <div class="profile-card">

                <!-- Header com avatar atual -->
                <div class="profile-header">
                    <div class="profile-avatar-wrap">
                        <img id="currentAvatar" class="profile-avatar" src="" alt="Avatar" data-cy="admin-profile-avatar">
                    </div>
                    <div>
                        <div id="currentNome" style="font-size:14px;color:#ecf0f1;margin-bottom:6px;"></div>
                        <div id="currentUsername" style="font-size:8px;color:#7f8c8d;"></div>
                        <div id="currentFaction" style="font-size:8px;color:#7f8c8d;margin-top:4px;"></div>
                    </div>
                </div>

                <div class="profile-body">

                    <!-- Seção: Nome -->
                    <div>
                        <div class="profile-section-title">✏️ NOME DE EXIBIÇÃO</div>
                        <input type="text" id="inputNome" class="pixel-input"
                               style="width:100%;box-sizing:border-box;"
                               placeholder="Seu nome de exibição"
                               data-cy="input-profile-nome">
                    </div>

                    <!-- Seção: Avatar -->
                    <div>
                        <div class="profile-section-title">🖼️ AVATAR</div>
                        <div class="profile-avatar-preview-row">
                            <img id="avatarPreview" class="profile-avatar-preview" src="" alt="Preview">
                            <div style="flex:1;">
                                <button class="profile-dicebear-btn" data-cy="btn-dicebear"
                                        onclick="useDicebear()">⚡ Gerar com DiceBear</button>
                                <div style="font-size:7px;color:#7f8c8d;margin-top:6px;">Avatar pixel art único gerado pelo seu username</div>
                            </div>
                        </div>
                        <input type="text" id="inputAvatarUrl" class="pixel-input"
                               style="width:100%;box-sizing:border-box;"
                               placeholder="Ou cole uma URL de imagem..."
                               data-cy="input-profile-avatar-url"
                               oninput="previewAvatar(this.value)">
                    </div>

                    <!-- Seção: Senha -->
                    <div>
                        <div class="profile-section-title">🔒 ALTERAR SENHA</div>
                        <div style="display:flex;flex-direction:column;gap:10px;">
                            <input type="password" id="inputCurrentPassword" class="pixel-input"
                                   style="width:100%;box-sizing:border-box;"
                                   placeholder="Senha atual"
                                   data-cy="input-current-password">
                            <input type="password" id="inputNewPassword" class="pixel-input"
                                   style="width:100%;box-sizing:border-box;"
                                   placeholder="Nova senha (mín. 3 caracteres)"
                                   data-cy="input-new-password">
                            <input type="password" id="inputConfirmPassword" class="pixel-input"
                                   style="width:100%;box-sizing:border-box;"
                                   placeholder="Confirmar nova senha"
                                   data-cy="input-confirm-password">
                        </div>
                        <div style="font-size:7px;color:#7f8c8d;margin-top:8px;">Deixe em branco para manter a senha atual.</div>
                    </div>

                    <!-- Botão salvar -->
                    <button class="btn-pixel" onclick="saveProfile()"
                            data-cy="btn-save-profile"
                            style="width:100%;padding:12px;font-size:10px;background:#27ae60;">
                        ✔ SALVAR PERFIL
                    </button>

                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" data-cy="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin-header.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/admin-profile.js"></script>
</body>
</html>
