<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuildWork - Perfil</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧙</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .perfil-wrapper {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .perfil-card {
            background: var(--card-bg, #1a2634);
            border: 2px solid #2c3e50;
            border-radius: 4px;
            overflow: hidden;
        }

        .perfil-header {
            background: #0d1520;
            border-bottom: 2px solid #2c3e50;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .perfil-avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .perfil-avatar {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border: 2px solid #2c3e50;
            image-rendering: pixelated;
        }

        .perfil-level-badge {
            position: absolute;
            bottom: -6px;
            right: -6px;
            background: #f39c12;
            color: #0d1520;
            font-size: 8px;
            font-weight: bold;
            padding: 2px 5px;
            letter-spacing: 1px;
        }

        .perfil-info { flex: 1; }

        .perfil-nome {
            font-size: 18px;
            color: #ecf0f1;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .perfil-faction-badge {
            display: inline-block;
            font-size: 8px;
            color: #7f8c8d;
            border: 1px solid #2c3e50;
            padding: 3px 8px;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .perfil-xp-label {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            color: #7f8c8d;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .perfil-xp-track {
            background: #0d1520;
            height: 6px;
            border: 1px solid #2c3e50;
            border-radius: 1px;
            overflow: hidden;
        }

        .perfil-xp-fill {
            height: 100%;
            background: #8e44ad;
            transition: width 0.4s;
        }

        .perfil-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-top: 2px solid #2c3e50;
        }

        .perfil-stat {
            padding: 14px 8px;
            text-align: center;
            border-right: 1px solid #2c3e50;
            border-bottom: 1px solid #2c3e50;
        }

        .perfil-stat:nth-child(3),
        .perfil-stat:nth-child(6) { border-right: none; }
        .perfil-stat:nth-child(4),
        .perfil-stat:nth-child(5),
        .perfil-stat:nth-child(6) { border-bottom: none; }

        .perfil-stat-icon  { font-size: 18px; display: block; margin-bottom: 6px; }
        .perfil-stat-value { font-size: 16px; color: #ecf0f1; display: block; margin-bottom: 2px; }
        .perfil-stat-label { font-size: 7px; color: #7f8c8d; letter-spacing: 1px; text-transform: uppercase; }

        .perfil-curse-banner {
            margin: 0 20px 0;
            padding: 10px 14px;
            border-radius: 2px;
            font-size: 9px;
            letter-spacing: 1px;
        }

        .perfil-section-title {
            font-size: 8px;
            color: #7f8c8d;
            letter-spacing: 2px;
            padding: 16px 20px 8px;
            border-top: 2px solid #2c3e50;
        }

        .perfil-achievements {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 20px 20px;
        }

        .achievement-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 3px;
            border: 1px solid #2c3e50;
        }

        .achievement-badge.unlocked {
            background: rgba(243, 156, 18, 0.06);
            border-color: #f39c12;
        }

        .achievement-badge.locked {
            opacity: 0.35;
        }

        .achievement-icon  { font-size: 18px; line-height: 1; }
        .achievement-name  { font-size: 9px; color: #f1c40f; font-weight: bold; letter-spacing: 1px; flex: 1; }
        .achievement-desc  { font-size: 7px; color: #7f8c8d; margin-top: 2px; }
        .achievement-check { font-size: 10px; color: #27ae60; }

        .perfil-loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 10px;
            color: #7f8c8d;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>
    <div class="top-bar" style="justify-content: space-between;">
            <h1 style="margin:0; font-size:14px; color:#f39c12;">🧙 PERFIL DO AVENTUREIRO</h1>
            <div class="actions">
                <button class="btn-pixel" data-cy="btn-voltar" onclick="handleVoltar()">← Voltar</button>

                <span class="actions-divider"></span>

                <button class="btn-pixel logout-btn" data-cy="btn-logout" onclick="logout()">Sair</button>
            </div>
        </div>

    <div class="main-wrapper">
        <div class="perfil-wrapper">
            <div class="perfil-card" id="perfilCard" data-cy="perfil-card">
                <div class="perfil-loading" id="perfilLoading">Carregando aventureiro...</div>
            </div>
        </div>
    </div>

    <!-- Modal de alterações não salvas -->
    <div id="unsavedModal" class="modal-overlay" style="display:none;" data-cy="modal-unsaved">
        <div class="modal-content" style="max-width:340px;text-align:center;">
            <div style="font-size:28px;margin-bottom:12px;">⚠️</div>
            <h2 class="section-title" style="text-align:center;margin-bottom:8px;">ALTERAÇÕES NÃO SALVAS</h2>
            <p style="font-size:9px;color:#bdc3c7;letter-spacing:1px;line-height:1.8;margin-bottom:24px;">
                Você tem alterações que ainda<br>não foram salvas no servidor.<br>Deseja sair mesmo assim?
            </p>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <button class="btn-pixel" data-cy="btn-confirm-sair"
                        onclick="confirmUnsavedExit()"
                        style="background:#c0392b;padding:12px;">
                    SAIR SEM SALVAR
                </button>
                <button class="btn-pixel" data-cy="btn-continuar-editando"
                        onclick="document.getElementById('unsavedModal').style.display='none'"
                        style="background:#2c3e50;padding:12px;">
                    ✏️ CONTINUAR EDITANDO
                </button>
            </div>
        </div>
    </div>

    <div id="toast-container" data-cy="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>
