<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfficeQuest - Loja de Loot</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="top-bar">
            <div class="player-info">
                <div class="avatar">QA<br>Master</div>
                <div class="stats">
                    <h1 id="playerName" data-cy="player-name">Loja da Guilda</h1>
                    <div class="coin-display"><span class="coin-icon">💰</span> <span id="coinCount" data-cy="coin-count">0</span> Gold</div>
                </div>
            </div>
            <div class="actions">
                <a href="index.html" class="btn-pixel" data-cy="btn-voltar-mural">Voltar ao Mural</a>
                <button class="btn-pixel logout-btn" data-cy="btn-logout" onclick="logout()">Sair</button>
            </div>
        </div>

        <div class="shop-layout">
            
            <div class="shop-container">
                <h2 class="shop-title">LOJA DE LOOT (SWAG)</h2>
                
                <div class="items-grid">
                    <div class="shop-item" data-cy="product-caneta">
                        <div class="item-name">Caneta da Guilda</div>
                        <img src="assets/imgs/caneta_pixel.jpg" alt="Img" class="item-img">
                        <div class="item-price">20 💰</div>
                        <button class="btn-pixel btn-buy" data-cy="btn-add-caneta" onclick="addToCart('Caneta da Guilda', 20)">Adicionar</button>
                    </div>

                    <div class="shop-item" data-cy="product-caneca">
                        <div class="item-name">Caneca de Café +5 Mana</div>
                        <img src="assets/imgs/caneca_pixel.jpg" alt="Img" class="item-img">
                        <div class="item-price">50 💰</div>
                        <button class="btn-pixel btn-buy" data-cy="btn-add-caneca" onclick="addToCart('Caneca de Café', 50)">Adicionar</button>
                    </div>

                    <div class="shop-item" data-cy="product-camiseta">
                        <div class="item-name">Camiseta Oficial</div>
                        <img src="assets/imgs/camiseta_pixel.jpg" alt="Img" class="item-img">
                        <div class="item-price">150 💰</div>
                        <button class="btn-pixel btn-buy" data-cy="btn-add-camiseta" onclick="addToCart('Camiseta Oficial', 150)">Adicionar</button>
                    </div>

                    <div class="shop-item" data-cy="product-mouse">
                        <div class="item-name">Mouse</div>
                        <img src="assets/imgs/mouse_pixel.jpg" alt="Img" class="item-img">
                        <div class="item-price">300 💰</div>
                        <button class="btn-pixel btn-buy" data-cy="btn-add-mouse" onclick="addToCart('Mouse', 300)">Adicionar</button>
                    </div>

                    <div class="shop-item" data-cy="product-mochila">
                        <div class="item-name">Mochila Lendária</div>
                        <img src="assets/imgs/mochila_pixel.jpg" alt="Img" class="item-img">
                        <div class="item-price">500 💰</div>
                        <button class="btn-pixel btn-buy" data-cy="btn-add-mochila" onclick="addToCart('Mochila Lendária', 500)">Adicionar</button>
                    </div>
                </div>
            </div>

            <div class="cart-container">
                <div class="cart-title">SEU INVENTÁRIO</div>
                <div class="cart-items" id="cartList" data-cy="cart-list">
                    </div>
                <div class="cart-total">Total: <span id="cartTotal" data-cy="cart-total">0</span> 💰</div>
                
                <button class="btn-pixel btn-checkout" data-cy="btn-checkout" onclick="checkout()">FINALIZAR COMPRA</button>
                <button class="btn-pixel btn-clear" data-cy="btn-clear-cart" onclick="clearCart()" style="margin-top: 10px;">ESVAZIAR CARRINHO</button>
            </div>

        </div>
    </div>

    <div id="toast-container" data-cy="toast-container"></div>

    <script src="js/utils.js"></script>
    <script src="js/loja.js"></script>
</body>
</html>
