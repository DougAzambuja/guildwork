<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfficeQuest - Loja de Loot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-bar" style="justify-content: space-between;">
            <h1 style="margin:0; font-size:14px; color:#f39c12;">🏪 LOJA DA GUILDA</h1>
            <div class="actions">
                <a href="index.html" class="btn-pixel" data-cy="btn-voltar-mural">Voltar ao Mural</a>
                <button class="btn-pixel logout-btn" data-cy="btn-logout" onclick="logout()">Sair</button>
            </div>
        </div>

    <div class="main-wrapper">
        <div class="shop-layout">

            <!-- A: Card de perfil do jogador -->
            <div id="shopProfile" class="shop-profile"></div>

            <div class="shop-container">
                <h2 class="shop-title">LOJA DE LOOT (SWAG)</h2>
                
                <div class="items-grid" id="itemsGrid" data-cy="items-grid">
                    </div>
            </div>

            <div class="cart-container">
                <div class="cart-title">SEU INVENTÁRIO</div>
                <div class="cart-items" id="cartList" data-cy="cart-list">
                    </div>
                <div class="cart-total">Total: <span id="cartTotal" data-cy="cart-total">0</span> 💰</div>
                
                <button class="btn-pixel btn-checkout" data-cy="btn-checkout" onclick="checkout()">FINALIZAR COMPRA</button>
                <button class="btn-pixel btn-clear" data-cy="btn-clear-cart" onclick="clearCart()" style="margin-top: 10px;">ESVAZIAR CARRINHO</button>
            </div>

        </div>
    </div>

    <div id="toast-container" data-cy="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/loja.js"></script>
</body>
</html>
