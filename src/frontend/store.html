<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfficeQuest - Loja de Loot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loading-overlay" data-cy="loading-overlay">
        <span class="loading-sword">🏪</span>
        <div class="loading-text">CARREGANDO LOJA...</div>
        <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
    </div>
    <div class="top-bar">
        <div class="player-info">
            <img src="assets/imgs/caneca_pixel.jpg" alt="Avatar" class="avatar" id="storePlayerAvatar"
                 style="object-fit:cover; cursor:pointer;"
                 onclick="window.location.href='perfil.html'"
                 title="Ver meu perfil"
                 data-cy="store-player-avatar">
            <div class="stats">
                <h1 id="storePlayerName" data-cy="store-player-name">Aventureiro</h1>
                <div id="storePlayerInfo" style="font-size: 9px; color: #7f8c8d;">Lvl: 1</div>
                <div class="xp-container"><div class="xp-bar" id="storeXpBar"></div></div>
                <div class="coin-display"><span class="coin-icon">💰</span> <span id="storePlayerCoins">0</span> Gold</div>
            </div>
        </div>
        <div class="actions">
            <a href="index.html"       class="btn-pixel" data-cy="btn-mural" style="background:#2980b9;">🗺️ Mural</a>
            <a href="guild.html"       class="btn-pixel" data-cy="btn-guilda" style="background:#8e44ad;">🏰 Guilda</a>
            <a href="leaderboard.html" class="btn-pixel" data-cy="btn-ranking" style="background:#c0392b;">🏆 Ranking</a>

            <span class="actions-divider"></span>

            <button class="btn-pixel logout-btn" data-cy="btn-logout" onclick="logout()">Sair</button>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="shop-layout">

            <!-- A: Card de perfil do jogador -->
            <div id="shopProfile" class="shop-profile"></div>

            <div class="shop-container">
                <h2 class="shop-title">LOJA DE LOOT (SWAG)</h2>
                
                <div class="items-grid" id="itemsGrid" data-cy="items-grid">
                    </div>
            </div>

            <div class="cart-container">
                <div class="cart-title">SEU INVENTÁRIO</div>
                <div class="cart-items" id="cartList" data-cy="cart-list">
                    </div>
                <div class="cart-total">Total: <span id="cartTotal" data-cy="cart-total">0</span> 💰</div>
                
                <button class="btn-pixel btn-checkout" data-cy="btn-checkout" onclick="checkout()">FINALIZAR COMPRA</button>
                <button class="btn-pixel btn-clear" data-cy="btn-clear-cart" onclick="clearCart()" style="margin-top: 10px;">ESVAZIAR CARRINHO</button>
            </div>

        </div>
    </div>

    <div id="toast-container" data-cy="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/store.js"></script>
</body>
</html>
