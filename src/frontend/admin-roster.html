<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuildWork - Membros</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="top-bar">
            <div class="player-info">
                <div class="avatar" style="background-color: #f1c40f; display:flex; align-items:center; justify-content:center; font-size:8px; text-align:center;">DM</div>
                <div class="stats">
                    <h1 id="playerName">Mestre da Guilda</h1>
                    <div style="font-size: 10px; color: #7f8c8d;">Centro de Comando</div>
                </div>
            </div>
            <div class="actions">
                <button class="btn-pixel logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>

        <nav class="admin-tabs">
            <a href="admin.html" class="admin-tab">📈 Dashboard</a>
            <a href="admin-quests.html" class="admin-tab">⚔️ Missões</a>
            <a href="admin-loot.html" class="admin-tab">🔨 Loot</a>
            <a href="admin-roster.html" class="admin-tab active">🛡️ Membros</a>
            <a href="admin-sprints.html" class="admin-tab">🏃 Sprints</a>
        </nav>

        <div style="display:flex; flex-direction:column; gap:24px;">

            <div class="dashboard-section">
                <h2 class="section-title">⚔️ RECRUTAR AVENTUREIRO</h2>
                <form id="registerForm" class="forge-form" data-cy="form-register">
                    <div class="forge-group">
                        <label for="regUsername">Username (login)</label>
                        <input type="text" id="regUsername" class="pixel-input" placeholder="Ex: joao.silva" required autocomplete="off">
                    </div>
                    <div class="forge-group">
                        <label for="regNome">Nome do Herói</label>
                        <input type="text" id="regNome" class="pixel-input" placeholder="Ex: João Silva" required autocomplete="off">
                    </div>
                    <div class="forge-group">
                        <label for="regPassword">Senha Inicial</label>
                        <input type="password" id="regPassword" class="pixel-input" placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                    <div class="forge-group">
                        <label for="regGuilda">Guilda</label>
                        <select id="regGuilda" class="pixel-input">
                            <option value="Produto">📦 Produto</option>
                            <option value="Suporte">🎧 Suporte</option>
                            <option value="Customer Service">📣 Customer Service</option>
                            <option value="__admin__">🏰 Admin (Mestre da Guilda)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-pixel" style="background-color: #27ae60; padding: 15px;">⚔️ RECRUTAR</button>
                </form>
            </div>

            <div class="dashboard-section" data-cy="dashboard-users">
                <h2 class="section-title">🛡️ ROSTER DA GUILDA</h2>
                <div class="users-table-wrapper">
                    <table class="users-table" data-cy="users-table">
                        <thead>
                            <tr>
                                <th>Avatar</th>
                                <th>Aventureiro</th>
                                <th>Guilda</th>
                                <th>Nível (XP)</th>
                                <th>Gold</th>
                                <th>Missões</th>
                                <th>Status</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
                <div id="usersPagination" class="pagination-controls"></div>
            </div>

        </div>
    </div>

    <!-- Modal de Edição de Usuário -->
    <div id="editUserModal" class="modal-overlay" style="display: none;" onclick="if(event.target===this)closeEditUserModal()">
        <div class="modal-content">
            <h2 class="section-title">🛡️ EDITAR AVENTUREIRO</h2>
            <form id="editUserForm" class="forge-form">
                <input type="hidden" id="editUserId">
                <div class="forge-group">
                    <label>Nome do Herói</label>
                    <input type="text" id="editUserNome" class="pixel-input" required>
                </div>
                <div class="forge-group">
                    <label>Guilda</label>
                    <select id="editUserGuilda" class="pixel-input">
                        <option value="Produto">📦 Produto</option>
                        <option value="Suporte">🎧 Suporte</option>
                        <option value="Customer Service">📣 Customer Service</option>
                        <option value="__admin__">🏰 Admin (Mestre da Guilda)</option>
                    </select>
                </div>
                <div class="forge-group">
                    <label>Nova Senha (deixe vazio para não alterar)</label>
                    <input type="password" id="editUserPassword" class="pixel-input" placeholder="Mínimo 6 caracteres" minlength="6">
                </div>
                <div class="actions" style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="submit" class="btn-pixel" style="background-color: #27ae60;">SALVAR</button>
                    <button type="button" class="btn-pixel" style="background-color: #7f8c8d;" onclick="closeEditUserModal()">CANCELAR</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin-roster.js"></script>
</body>
</html>
