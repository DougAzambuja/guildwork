<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuildWork - Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-page">
    <div id="loading-overlay" data-cy="loading-overlay">
        <span class="loading-sword">⚙️</span>
        <div class="loading-text">CARREGANDO PAINEL...</div>
        <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
    </div>
    <div id="admin-header"></div>

    <div class="main-wrapper">
        <div style="display:flex; flex-direction:column; gap:24px;">

            <div class="dashboard-section" data-cy="dashboard-report">
                <h2 class="section-title">📈 RELATÓRIO DE PERFORMANCE (SPRINT)</h2>
                <div class="report-grid">
                    <div class="report-card">
                        <div class="report-label">Gold Acumulado</div>
                        <div class="report-value gold-text">
                            <span class="coin-icon">💰</span> <span id="repTotalGold">0</span>
                        </div>
                    </div>
                    <div class="report-card">
                        <div class="report-label">Integridade do SLA</div>
                        <div class="report-value sla-text">
                            <span>🛡️</span> <span id="repSlaHealth">100%</span>
                        </div>
                    </div>
                </div>
                <div class="factions-grid">
                    <div class="faction-card">
                        <h3 class="section-title" style="font-size: 10px; border-bottom: none;">🏆 TOP PERFORMERS (XP)</h3>
                        <div id="topPerformersList"></div>
                    </div>
                </div>
            </div>

            <!-- SPRINT -->
            <div class="dashboard-section" data-cy="dashboard-active-sprint" id="dashSprintSection" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
                    <h2 class="section-title" style="margin:0; border:none;">🏃 SPRINT</h2>
                    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                        <select id="dashSprintSelect" data-cy="select-dash-sprint"
                                style="font-family:'Press Start 2P',cursive; font-size:7px; padding:5px 8px; background:#1a252f; color:#f1c40f; border:2px solid #2c3e50; outline:none; cursor:pointer; max-width:220px;"
                                onchange="onDashSprintChange(this.value)">
                            <option value="">Carregando...</option>
                        </select>
                        <span id="dashSprintHealth" class="status-badge" style="font-size:8px; padding:3px 10px; display:none;"></span>
                        <a id="dashSprintBoardLink" href="#" class="btn-pixel" data-cy="btn-open-board-dashboard"
                           style="font-size:7px; padding:5px 9px; background:#2980b9; text-decoration:none; display:inline-block;">
                            📋 Abrir Board
                        </a>
                        <a href="admin-events.html" class="btn-pixel" data-cy="btn-go-events"
                           style="font-size:7px; padding:5px 9px; background:#8e44ad; text-decoration:none; display:inline-block;">
                            ⚡ Eventos
                        </a>
                    </div>
                </div>

                <div style="background:#1a252f; border:2px solid #2c3e50; padding:14px;">
                    <div style="display:flex; flex-wrap:wrap; gap:16px; justify-content:space-between; margin-bottom:12px;">
                        <div>
                            <div style="font-size:8px; color:#7f8c8d;">NOME</div>
                            <div id="dashSprintName" style="font-size:10px; color:#f1c40f; margin-top:3px;"></div>
                        </div>
                        <div>
                            <div style="font-size:8px; color:#7f8c8d;">PERÍODO</div>
                            <div id="dashSprintPeriod" style="font-size:9px; color:#bdc3c7; margin-top:3px;"></div>
                        </div>
                        <div>
                            <div style="font-size:8px; color:#7f8c8d;">DIAS RESTANTES</div>
                            <div id="dashSprintDaysLeft" style="font-size:14px; color:#2ecc71; margin-top:3px;"></div>
                        </div>
                        <div>
                            <div style="font-size:8px; color:#7f8c8d;">QUESTS</div>
                            <div id="dashSprintQuests" style="font-size:9px; color:#3498db; margin-top:3px;"></div>
                        </div>
                    </div>

                    <!-- Barra de conclusão -->
                    <div>
                        <div style="display:flex; justify-content:space-between; font-size:7px; color:#7f8c8d; margin-bottom:3px;">
                            <span>Conclusão de quests</span>
                            <span id="dashSprintPct"></span>
                        </div>
                        <div style="background:#0d1b2a; height:8px; border-radius:2px; overflow:hidden;">
                            <div id="dashSprintBar" style="height:100%; background:#27ae60; transition:width 0.4s;"></div>
                        </div>
                    </div>

                    <!-- Breakdown por facção compacto -->
                    <div id="dashSprintFactions" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;"></div>
                </div>
            </div>

            <div class="dashboard-section" data-cy="dashboard-metrics">
                <h2 class="section-title">📊 DESEMPENHO DAS FACÇÕES (SPRINT ATUAL)</h2>
                <div class="factions-grid" id="factionsGrid"></div>
            </div>

        </div>
    </div>

    <div id="toast-container" data-cy="toast-container"></div>

    <!-- ═══ MODAL EVENTOS — BIBLIOTECA + ACIONAR ═══ -->
    <div id="encounterModal" data-cy="encounter-modal"
         style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:9000; align-items:flex-start; justify-content:center; padding-top:48px; overflow-y:auto;"
         onclick="if(event.target===this)closeEncounterModal()">
        <div style="background:#1a252f; border:2px solid #8e44ad; width:100%; max-width:520px; margin:0 16px 48px; box-sizing:border-box;">

            <!-- HEADER -->
            <div style="display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:2px solid #2c3e50;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <button id="encBtnBack" data-cy="btn-enc-back" onclick="encShowLibrary()"
                            style="display:none; background:transparent; border:none; color:#8e44ad; font-size:14px; cursor:pointer; padding:0;">←</button>
                    <span id="encModalTitle" style="font-family:'Press Start 2P',cursive; font-size:10px; color:#e056fd;">⚡ EVENTOS</span>
                </div>
                <button onclick="closeEncounterModal()" style="background:transparent; border:none; color:#7f8c8d; font-size:14px; cursor:pointer;">✕</button>
            </div>

            <!-- VIEW: BIBLIOTECA -->
            <div id="encViewLibrary" style="padding:20px;">
                <div id="encTemplateList" data-cy="encounter-template-list">
                    <div style="font-size:8px; color:#7f8c8d; padding:20px 0; text-align:center;">Carregando biblioteca...</div>
                </div>
                <button class="btn-pixel" data-cy="btn-enc-new-template" onclick="encShowCreate()"
                        style="width:100%; margin-top:12px; font-size:7px; padding:9px; background:#2c3e50; border:none; cursor:pointer;">
                    + Criar Novo Evento
                </button>
            </div>

            <!-- VIEW: CRIAR TEMPLATE -->
            <div id="encViewCreate" style="display:none; padding:20px;">
                <form id="encCreateForm" data-cy="form-enc-create" onsubmit="encSubmitCreate(event)">
                    <label style="display:block; font-size:8px; color:#bdc3c7; margin-bottom:4px;">TÍTULO *</label>
                    <input id="encTplTitle" data-cy="input-enc-tpl-title" type="text" required
                           style="width:100%; box-sizing:border-box; font-family:'Press Start 2P',cursive; font-size:8px; padding:7px 9px; background:#0d1b2a; color:#fff; border:2px solid #2c3e50; outline:none; margin-bottom:12px;"
                           placeholder="Ex: Semana Dourada">

                    <label style="display:block; font-size:8px; color:#bdc3c7; margin-bottom:4px;">DESCRIÇÃO</label>
                    <input id="encTplDesc" data-cy="input-enc-tpl-desc" type="text"
                           style="width:100%; box-sizing:border-box; font-family:'Press Start 2P',cursive; font-size:8px; padding:7px 9px; background:#0d1b2a; color:#fff; border:2px solid #2c3e50; outline:none; margin-bottom:12px;"
                           placeholder="Detalhes do evento (opcional)">

                    <div style="display:flex; gap:12px; margin-bottom:12px;">
                        <div style="flex:1;">
                            <label style="display:block; font-size:8px; color:#bdc3c7; margin-bottom:4px;">EFEITO *</label>
                            <select id="encTplKind" data-cy="select-enc-tpl-kind" required
                                    style="width:100%; font-family:'Press Start 2P',cursive; font-size:7px; padding:7px 6px; background:#0d1b2a; color:#f1c40f; border:2px solid #2c3e50; outline:none; cursor:pointer;">
                                <option value="xp_bonus">✨ Bônus de XP</option>
                                <option value="gold_bonus">💰 Bônus de Gold</option>
                                <option value="xp_penalty">💀 Penalidade de XP</option>
                                <option value="gold_penalty">💸 Penalidade de Gold</option>
                                <option value="luck">🍀 Sorte (2x XP)</option>
                                <option value="slow">🐌 Lentidão (SLA)</option>
                                <option value="store_discount">🏷️ Desconto na Loja</option>
                            </select>
                        </div>
                        <div style="flex:1;">
                            <label style="display:block; font-size:8px; color:#bdc3c7; margin-bottom:4px;">VALOR (%) *</label>
                            <input id="encTplValue" data-cy="input-enc-tpl-value" type="number" required min="1" max="100" value="50"
                                   style="width:100%; box-sizing:border-box; font-family:'Press Start 2P',cursive; font-size:8px; padding:7px 9px; background:#0d1b2a; color:#fff; border:2px solid #2c3e50; outline:none;">
                        </div>
                    </div>

                    <div style="display:flex; gap:12px; margin-bottom:20px;">
                        <div style="flex:1;">
                            <label style="display:block; font-size:8px; color:#bdc3c7; margin-bottom:4px;">DURAÇÃO PADRÃO (h) *</label>
                            <input id="encTplDuration" data-cy="input-enc-tpl-duration" type="number" required min="1" max="168" value="2"
                                   style="width:100%; box-sizing:border-box; font-family:'Press Start 2P',cursive; font-size:8px; padding:7px 9px; background:#0d1b2a; color:#fff; border:2px solid #2c3e50; outline:none;">
                        </div>
                        <div style="flex:1;">
                            <label style="display:block; font-size:8px; color:#bdc3c7; margin-bottom:4px;">ESCOPO PADRÃO</label>
                            <select id="encTplScope" data-cy="select-enc-tpl-scope"
                                    style="width:100%; font-family:'Press Start 2P',cursive; font-size:7px; padding:7px 6px; background:#0d1b2a; color:#f1c40f; border:2px solid #2c3e50; outline:none; cursor:pointer;">
                                <option value="global">🌐 Global</option>
                                <option value="faction">🏰 Facção</option>
                            </select>
                        </div>
                    </div>

                    <div style="display:flex; gap:8px; justify-content:flex-end;">
                        <button type="button" class="btn-pixel" onclick="encShowLibrary()"
                                style="font-size:7px; padding:7px 12px; background:#34495e; border:none; cursor:pointer;">Cancelar</button>
                        <button type="submit" class="btn-pixel" data-cy="btn-enc-save-template"
                                style="font-size:7px; padding:7px 12px; background:#27ae60; border:none; cursor:pointer;">💾 Salvar</button>
                    </div>
                </form>
            </div>

            <!-- VIEW: ACIONAR -->
            <div id="encViewTrigger" style="display:none; padding:20px;">
                <div id="encTriggerInfo" style="background:#0d1b2a; border:1px solid #8e44ad; padding:12px; margin-bottom:16px;"></div>

                <label style="display:block; font-size:8px; color:#bdc3c7; margin-bottom:4px;">DURAÇÃO (horas)</label>
                <input id="encTriggerDuration" data-cy="input-enc-trigger-duration" type="number" min="1" max="168"
                       style="width:100%; box-sizing:border-box; font-family:'Press Start 2P',cursive; font-size:8px; padding:7px 9px; background:#0d1b2a; color:#fff; border:2px solid #2c3e50; outline:none; margin-bottom:12px;">

                <label style="display:block; font-size:8px; color:#bdc3c7; margin-bottom:4px;">ESCOPO</label>
                <select id="encTriggerScope" data-cy="select-enc-trigger-scope"
                        style="width:100%; font-family:'Press Start 2P',cursive; font-size:7px; padding:7px 6px; background:#0d1b2a; color:#f1c40f; border:2px solid #2c3e50; outline:none; cursor:pointer; margin-bottom:12px;"
                        onchange="encToggleFaction()">
                    <option value="global">🌐 Global</option>
                    <option value="faction">🏰 Facção específica</option>
                </select>

                <div id="encTriggerFactionWrap" style="display:none; margin-bottom:16px;">
                    <label style="display:block; font-size:8px; color:#bdc3c7; margin-bottom:4px;">FACÇÃO</label>
                    <select id="encTriggerFaction" data-cy="select-enc-trigger-faction"
                            style="width:100%; font-family:'Press Start 2P',cursive; font-size:7px; padding:7px 6px; background:#0d1b2a; color:#f1c40f; border:2px solid #2c3e50; outline:none; cursor:pointer;">
                        <option value="Produto">📦 Produto</option>
                        <option value="Suporte">🎧 Suporte</option>
                        <option value="Customer Service">📣 Customer Service</option>
                    </select>
                </div>

                <div style="display:flex; gap:8px; justify-content:flex-end;">
                    <button type="button" class="btn-pixel" onclick="encShowLibrary()"
                            style="font-size:7px; padding:7px 12px; background:#34495e; border:none; cursor:pointer;">Cancelar</button>
                    <button type="button" class="btn-pixel" data-cy="btn-enc-confirm-trigger" onclick="encSubmitTrigger()"
                            style="font-size:7px; padding:7px 12px; background:#8e44ad; border:none; cursor:pointer;">⚡ Acionar!</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin-header.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
