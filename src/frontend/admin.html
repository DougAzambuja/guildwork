<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuildWork - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="top-bar">
            <div class="player-info">
                <div class="avatar" style="background-color: #f1c40f; display:flex; align-items:center; justify-content:center; font-size:8px; text-align:center;">DM</div>
                <div class="stats">
                    <h1 id="playerName" data-cy="admin-name">Mestre da Guilda</h1>
                    <div style="font-size: 10px; color: #7f8c8d;">Centro de Comando</div>
                </div>
            </div>
            <div class="actions">
                <button class="btn-pixel logout-btn" data-cy="btn-logout" onclick="logout()">Sair</button>
            </div>
        </div>

        <nav class="admin-tabs">
            <a href="admin.html" class="admin-tab active">📈 Dashboard</a>
            <a href="admin-quests.html" class="admin-tab">⚔️ Missões</a>
            <a href="admin-loot.html" class="admin-tab">🔨 Loot</a>
            <a href="admin-roster.html" class="admin-tab">🛡️ Membros</a>
        </nav>

        <div style="display:flex; flex-direction:column; gap:24px;">

            <div class="dashboard-section" data-cy="dashboard-report">
                <h2 class="section-title">📈 RELATÓRIO DE PERFORMANCE (SPRINT)</h2>
                <div class="report-grid">
                    <div class="report-card">
                        <div class="report-label">Gold Acumulado</div>
                        <div class="report-value gold-text">
                            <span class="coin-icon">💰</span> <span id="repTotalGold">0</span>
                        </div>
                    </div>
                    <div class="report-card">
                        <div class="report-label">Integridade do SLA</div>
                        <div class="report-value sla-text">
                            <span>🛡️</span> <span id="repSlaHealth">100%</span>
                        </div>
                    </div>
                </div>
                <div class="factions-grid">
                    <div class="faction-card">
                        <h3 class="section-title" style="font-size: 10px; border-bottom: none;">🏆 TOP PERFORMERS (XP)</h3>
                        <div id="topPerformersList"></div>
                    </div>
                </div>
            </div>

            <div class="dashboard-section" data-cy="dashboard-metrics">
                <h2 class="section-title">📊 DESEMPENHO DAS FACÇÕES (SPRINT ATUAL)</h2>
                <div class="factions-grid" id="factionsGrid"></div>
            </div>

        </div>
    </div>

    <div id="toast-container" data-cy="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
