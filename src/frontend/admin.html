<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuildWork - Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="admin-header"></div>

    <div class="main-wrapper">
        <div style="display:flex; flex-direction:column; gap:24px;">

            <div class="dashboard-section" data-cy="dashboard-report">
                <h2 class="section-title">📈 RELATÓRIO DE PERFORMANCE (SPRINT)</h2>
                <div class="report-grid">
                    <div class="report-card">
                        <div class="report-label">Gold Acumulado</div>
                        <div class="report-value gold-text">
                            <span class="coin-icon">💰</span> <span id="repTotalGold">0</span>
                        </div>
                    </div>
                    <div class="report-card">
                        <div class="report-label">Integridade do SLA</div>
                        <div class="report-value sla-text">
                            <span>🛡️</span> <span id="repSlaHealth">100%</span>
                        </div>
                    </div>
                </div>
                <div class="factions-grid">
                    <div class="faction-card">
                        <h3 class="section-title" style="font-size: 10px; border-bottom: none;">🏆 TOP PERFORMERS (XP)</h3>
                        <div id="topPerformersList"></div>
                    </div>
                </div>
            </div>

            <!-- SPRINT -->
            <div class="dashboard-section" data-cy="dashboard-active-sprint" id="dashSprintSection" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
                    <h2 class="section-title" style="margin:0; border:none;">🏃 SPRINT</h2>
                    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                        <select id="dashSprintSelect" data-cy="select-dash-sprint"
                                style="font-family:'Press Start 2P',cursive; font-size:7px; padding:5px 8px; background:#1a252f; color:#f1c40f; border:2px solid #2c3e50; outline:none; cursor:pointer; max-width:220px;"
                                onchange="onDashSprintChange(this.value)">
                            <option value="">Carregando...</option>
                        </select>
                        <span id="dashSprintHealth" class="status-badge" style="font-size:8px; padding:3px 10px; display:none;"></span>
                        <a id="dashSprintBoardLink" href="#" class="btn-pixel" data-cy="btn-open-board-dashboard"
                           style="font-size:7px; padding:5px 9px; background:#2980b9; text-decoration:none; display:inline-block;">
                            📋 Abrir Board
                        </a>
                    </div>
                </div>

                <div style="background:#1a252f; border:2px solid #2c3e50; padding:14px;">
                    <div style="display:flex; flex-wrap:wrap; gap:16px; justify-content:space-between; margin-bottom:12px;">
                        <div>
                            <div style="font-size:8px; color:#7f8c8d;">NOME</div>
                            <div id="dashSprintName" style="font-size:10px; color:#f1c40f; margin-top:3px;"></div>
                        </div>
                        <div>
                            <div style="font-size:8px; color:#7f8c8d;">PERÍODO</div>
                            <div id="dashSprintPeriod" style="font-size:9px; color:#bdc3c7; margin-top:3px;"></div>
                        </div>
                        <div>
                            <div style="font-size:8px; color:#7f8c8d;">DIAS RESTANTES</div>
                            <div id="dashSprintDaysLeft" style="font-size:14px; color:#2ecc71; margin-top:3px;"></div>
                        </div>
                        <div>
                            <div style="font-size:8px; color:#7f8c8d;">QUESTS</div>
                            <div id="dashSprintQuests" style="font-size:9px; color:#3498db; margin-top:3px;"></div>
                        </div>
                    </div>

                    <!-- Barra de conclusão -->
                    <div>
                        <div style="display:flex; justify-content:space-between; font-size:7px; color:#7f8c8d; margin-bottom:3px;">
                            <span>Conclusão de quests</span>
                            <span id="dashSprintPct"></span>
                        </div>
                        <div style="background:#0d1b2a; height:8px; border-radius:2px; overflow:hidden;">
                            <div id="dashSprintBar" style="height:100%; background:#27ae60; transition:width 0.4s;"></div>
                        </div>
                    </div>

                    <!-- Breakdown por facção compacto -->
                    <div id="dashSprintFactions" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;"></div>
                </div>
            </div>

            <div class="dashboard-section" data-cy="dashboard-metrics">
                <h2 class="section-title">📊 DESEMPENHO DAS FACÇÕES (SPRINT ATUAL)</h2>
                <div class="factions-grid" id="factionsGrid"></div>
            </div>

        </div>
    </div>

    <div id="toast-container" data-cy="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin-header.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
