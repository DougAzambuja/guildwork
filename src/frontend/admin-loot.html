<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuildWork - Loot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-bar">
            <div class="player-info">
                <div class="avatar" style="background-color: #f1c40f; display:flex; align-items:center; justify-content:center; font-size:8px; text-align:center;">DM</div>
                <div class="stats">
                    <h1 id="playerName">Mestre da Guilda</h1>
                    <div style="font-size: 10px; color: #7f8c8d;">Centro de Comando</div>
                </div>
            </div>
            <div class="actions">
                <button class="btn-pixel logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>

        <nav class="admin-tabs">
            <a href="admin.html" class="admin-tab">📈 Dashboard</a>
            <a href="admin-quests.html" class="admin-tab">⚔️ Missões</a>
            <a href="admin-loot.html" class="admin-tab active">🔨 Loot</a>
            <a href="admin-roster.html" class="admin-tab">🛡️ Membros</a>
            <a href="admin-sprints.html" class="admin-tab">🏃 Sprints</a>
            <a href="admin-metrics.html" class="admin-tab">📊 Métricas</a>
        </nav>

    <div class="main-wrapper">
        <div style="display:flex; flex-direction:column; gap:24px;">

            <div class="dashboard-section" data-cy="dashboard-forge">
                <h2 class="section-title">🔨 FORJA DE LOOT (GERENCIAR ITEM)</h2>
                <form id="lootForm" class="forge-form" data-cy="form-add-loot">
                    <div class="forge-group">
                        <label for="lootName">Nome do Item</label>
                        <input type="text" id="lootName" class="pixel-input" data-cy="input-loot-name" placeholder="Ex: Moletom Épico" required autocomplete="off">
                    </div>
                    <div class="forge-group">
                        <label for="lootPrice">Preço (Gold 💰)</label>
                        <input type="number" id="lootPrice" class="pixel-input" data-cy="input-loot-price" placeholder="Ex: 800" required min="1">
                    </div>
                    <div class="forge-group">
                        <label for="lootImage">Imagem (Pixel Art)</label>
                        <select id="lootImage" class="pixel-input" data-cy="select-loot-image">
                            <option value="assets/imgs/camiseta_pixel.jpg">Camiseta/Roupa</option>
                            <option value="assets/imgs/caneca_pixel.jpg">Caneca/Copo</option>
                            <option value="assets/imgs/mochila_pixel.jpg">Mochila/Bolsa</option>
                            <option value="assets/imgs/mouse_pixel.jpg">Eletrônico/Mouse</option>
                            <option value="assets/imgs/caneta_pixel.jpg">Caneta/Acessório</option>
                        </select>
                    </div>
                    <button type="submit" id="btnSubmitLoot" class="btn-pixel" data-cy="btn-submit-loot" style="background-color: #8e44ad; padding: 15px;">FORJAR ITEM</button>
                </form>
            </div>

            <div class="dashboard-section" data-cy="dashboard-inventory">
                <h2 class="section-title">📦 ESTOQUE DA GUILDA</h2>
                <div id="inventoryList" class="inventory-list" data-cy="inventory-list"></div>
                <div id="inventoryPagination" class="pagination-controls"></div>
            </div>

        </div>
    </div>

    <!-- Modal de Edição de Loot -->
    <div id="editLootModal" class="modal-overlay" style="display: none;" onclick="if(event.target===this)closeEditModal()">
        <div class="modal-content">
            <h2 class="section-title">🔨 EDITAR LOOT</h2>
            <form id="editLootForm" class="forge-form">
                <div class="forge-group">
                    <label>Novo Nome</label>
                    <input type="text" id="editLootName" class="pixel-input" required>
                </div>
                <div class="forge-group">
                    <label>Novo Preço</label>
                    <input type="number" id="editLootPrice" class="pixel-input" required>
                </div>
                <div class="actions" style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="submit" class="btn-pixel" style="background-color: #27ae60;">SALVAR</button>
                    <button type="button" class="btn-pixel" style="background-color: #7f8c8d;" onclick="closeEditModal()">CANCELAR</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin-loot.js"></script>
</body>
</html>
